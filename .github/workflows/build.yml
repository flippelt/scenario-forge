name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast gate: type-check, unit tests, and the web build. Runs on every PR.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  # Verify the Tauri desktop app compiles on all three OSes.
  desktop:
    needs: web
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libssl-dev
      - run: npm ci
      - name: Generate icons
        run: |
          node scripts/gen-icon.mjs
          npx tauri icon assets/icon.png
      - run: npm run tauri build
